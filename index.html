<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>군포시 실시간 버스 정보 - Live Gunpo Transit</title>

  <!-- Head Diagnostic Error Catcher -->
  <script>
    window.addEventListener('error', function (e) {
      var errDiv = document.getElementById('debug-error-overlay');
      if (!errDiv) {
        errDiv = document.createElement('div');
        errDiv.id = 'debug-error-overlay';
        errDiv.style.cssText = 'position:fixed; bottom:15px; left:15px; right:15px; background:rgba(239,68,68,0.95); border:1px solid #ef4444; color:white; padding:15px 20px; border-radius:12px; z-index:999999; font-family:monospace; font-size:12px; max-height:220px; overflow-y:auto; box-shadow:0 12px 30px rgba(0,0,0,0.5); backdrop-filter:blur(8px);';
        document.body.appendChild(errDiv);
      }
      errDiv.innerHTML += '<div style="margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.2); padding-bottom:5px; line-height:1.4;">' +
        '<strong>[JS Runtime Error]</strong> ' + e.message + '<br>' +
        '<span style="color:#fca5a5; font-size:11px;">at ' + e.filename + ' (Line ' + e.lineno + ', Col ' + e.colno + ')</span>' +
        '</div>';
    });
  </script>

  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom Styling -->
  <link rel="stylesheet" href="src/index.css">
</head>

<body>
  <div class="app-container">

    <!-- Top Glass Header -->
    <header class="app-header">
      <div class="logo-area">
        <div class="pulse-dot"></div>
        <i data-lucide="bus" class="bus-logo-icon"></i>
        <h1>군포시<span>BUS</span></h1>
        <span class="live-badge">GUNPO LIVE</span>
      </div>

      <!-- Quick Statistics widgets -->
      <div class="header-stats" id="stat-widget-container">
        <!-- Rendered by StatWidget.js -->
      </div>

      <div class="system-time" id="system-time">
        13:56:51
      </div>
    </header>

    <!-- Main Dashboard Grid -->
    <main class="dashboard-grid">

      <!-- LEFT SIDEBAR: Station Selector & Favorites -->
      <aside class="sidebar-panel glass-panel">
        <div class="panel-header">
          <i data-lucide="map-pin"></i>
          <h2>정류장 선택</h2>
        </div>

        <!-- Search station -->
        <div class="search-box">
          <i data-lucide="search"></i>
          <input type="text" id="station-search" placeholder="정류장 이름 또는 ID 검색...">
          <button id="search-clear-btn" class="search-clear-btn hidden">
            <i data-lucide="x"></i>
          </button>
        </div>

        <!-- Filter tabs: All, Favorites -->
        <div class="filter-tabs">
          <button class="tab-btn active" id="tab-all">전체</button>
          <button class="tab-btn" id="tab-fav">즐겨찾기 <span class="fav-count" id="fav-count">0</span></button>
        </div>

        <!-- Station list scroll area -->
        <div class="station-list" id="station-list-container">
          <!-- Rendered by StationList.js -->
        </div>
      </aside>

      <!-- Resizer: Left | Center -->
      <div class="panel-resizer" id="resizer-left" role="separator" aria-label="왼쪽 패널 크기 조절"></div>

      <!-- CENTER CONTENT: Map & Simulator Controls -->
      <section class="right-panel">

        <!-- TOP CENTER: Interactive SVG Route Map -->
        <div class="map-panel glass-panel">
          <div class="panel-header map-header">
            <div class="title-with-subtitle">
              <h2>실시간 노선도</h2>
              <p id="active-route-name">선택한 정류장의 버스 실시간 이동 경로</p>
            </div>
            <div class="map-legend">
              <span class="legend-item"><span class="legend-dot express"></span>광역</span>
              <span class="legend-item"><span class="legend-dot trunk"></span>간선</span>
              <span class="legend-item"><span class="legend-dot branch"></span>지선</span>
            </div>
          </div>

          <div class="map-container" id="route-map-container">
            <!-- Rendered by RouteMap.js -->
          </div>
        </div>

        <!-- BOTTOM CENTER: Simulation Control Panel -->
        <div class="control-panel glass-panel">
          <div class="panel-header">
            <i data-lucide="sliders" class="text-secondary"></i>
            <h2>시뮬레이션 컨트롤 센터</h2>
          </div>

          <div class="controls-content" id="control-panel-container">
            <!-- Rendered by ControlPanel.js -->
          </div>
        </div>

      </section>

      <!-- Resizer: Center | Right -->
      <div class="panel-resizer" id="resizer-right" role="separator" aria-label="오른쪽 패널 크기 조절"></div>

      <!-- RIGHT PANEL: Arrival Board -->
      <section class="arrival-panel glass-panel">
        <div class="panel-header arrival-board-header">
          <div class="header-title-group">
            <i data-lucide="activity" class="text-accent"></i>
            <h2 id="active-station-name">정류장을 선택하세요</h2>
            <span class="station-id-badge" id="active-station-id">STN-000</span>
          </div>
          <button class="fav-toggle-btn" id="station-fav-toggle" title="즐겨찾기 추가">
            <i data-lucide="heart" class="heart-icon"></i>
          </button>
        </div>

        <!-- Notification Banner for emergencies/delays -->
        <div class="alert-banner hidden" id="alert-banner">
          <i data-lucide="alert-triangle"></i>
          <div class="alert-content">
            <div class="alert-title">안내</div>
            <div class="alert-text">실시간 버스 지연이 감지되었습니다.</div>
          </div>
          <button class="alert-close" id="alert-close"><i data-lucide="x"></i></button>
        </div>

        <!-- Arrivals container -->
        <div class="arrival-board" id="arrival-board-container">
          <!-- Rendered by ArrivalBoard.js -->
        </div>
      </section>

    </main>
  </div>

  <!-- ══ 디버그 로그 패널 (우하단 토글) ══ -->
  <div id="debug-panel" style="
    position: fixed; bottom: 15px; right: 15px; z-index: 99998;
    width: 520px; max-height: 380px;
    background: rgba(6,9,17,0.97); border: 1px solid rgba(59,130,246,0.35);
    border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    backdrop-filter: blur(16px); font-family: monospace;
    display: none; flex-direction: column; overflow: hidden;">
    <div style="display:flex; justify-content:space-between; align-items:center;
                padding:10px 14px; border-bottom:1px solid rgba(255,255,255,0.07);
                background:rgba(59,130,246,0.08);">
      <span style="font-size:12px; font-weight:700; color:#93c5fd;">🔍 GBIS 디버그 콘솔</span>
      <div style="display:flex; gap:8px; align-items:center;">
        <button id="debug-clear" style="background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3);
          color:#fca5a5; padding:3px 8px; border-radius:6px; cursor:pointer; font-size:10px;">지우기</button>
        <button id="debug-raw-btn" style="background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.3);
          color:#6ee7b7; padding:3px 8px; border-radius:6px; cursor:pointer; font-size:10px;">원시 응답</button>
        <button id="debug-close"
          style="background:none; border:none; color:#6b7280; cursor:pointer; font-size:16px;">✕</button>
      </div>
    </div>
    <div id="debug-log-body" style="flex:1; overflow-y:auto; padding:10px 14px; font-size:10.5px;
      line-height:1.6; color:#94a3b8; display:flex; flex-direction:column; gap:4px;"></div>
    <div id="debug-raw-view" style="flex:1; overflow:auto; padding:10px 14px; display:none;">
      <div style="display:flex; gap:8px; margin-bottom:8px;">
        <input id="debug-station-input" value="26054" style="background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
          color:#f1f5f9; padding:4px 10px; border-radius:8px; font-size:11px; width:120px;" placeholder="stationId">
        <button id="debug-fetch-raw" style="background:rgba(59,130,246,0.2); border:1px solid rgba(59,130,246,0.4);
          color:#93c5fd; padding:4px 12px; border-radius:8px; cursor:pointer; font-size:11px;">조회</button>
      </div>
      <pre id="debug-raw-output" style="font-size:9.5px; color:#a5f3fc; white-space:pre-wrap;
        word-break:break-all; margin:0;"></pre>
    </div>
  </div>

  <!-- 디버그 패널 토글 버튼 -->
  <button id="debug-toggle-btn" title="디버그 콘솔 열기" style="position:fixed; bottom:15px; right:15px; z-index:99999;
    width:40px; height:40px; border-radius:50%; background:rgba(59,130,246,0.2);
    border:1px solid rgba(59,130,246,0.4); color:#93c5fd; cursor:pointer;
    font-size:16px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.3); transition:all 0.2s ease;">🔍</button>

  <!-- Entry Script as ES6 Module -->
  <script type="module" src="src/app.js"></script>

  <!-- 디버그 콘솔 스크립트 -->
  <script>
    (function () {
      const panel = document.getElementById('debug-panel');
      const toggleBtn = document.getElementById('debug-toggle-btn');
      const logBody = document.getElementById('debug-log-body');
      const rawView = document.getElementById('debug-raw-view');
      const rawOutput = document.getElementById('debug-raw-output');
      let logMode = true; // true=log, false=raw

      // ── 로그 수집 ──────────────────────────────────────
      const logs = [];
      function addLog(level, msg) {
        const now = new Date().toLocaleTimeString('ko-KR');
        const entry = { time: now, level, msg: String(msg) };
        logs.push(entry);
        if (logs.length > 200) logs.shift();
        renderLogs();
      }

      function renderLogs() {
        if (!logMode) return;
        logBody.innerHTML = logs.slice(-80).map(e => {
          const color = e.level === 'error' ? '#fca5a5' :
            e.level === 'warn' ? '#fde68a' :
              e.level === 'info' ? '#93c5fd' : '#94a3b8';
          return `<div style="color:${color}; border-bottom:1px solid rgba(255,255,255,0.04); padding-bottom:2px;">
          <span style="color:#475569; font-size:9.5px;">[${e.time}]</span>
          <span style="margin-left:4px;">${e.msg.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
        </div>`;
        }).join('');
        logBody.scrollTop = logBody.scrollHeight;
      }

      // console 가로채기
      const _log = console.log.bind(console);
      const _warn = console.warn.bind(console);
      const _error = console.error.bind(console);

      console.log = function (...args) {
        _log(...args);
        addLog('log', args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' '));
      };
      console.warn = function (...args) {
        _warn(...args);
        addLog('warn', args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' '));
      };
      console.error = function (...args) {
        _error(...args);
        addLog('error', args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' '));
      };

      // fetch 가로채기 (API 호출 추적)
      const _fetch = window.fetch.bind(window);
      window.fetch = async function (input, init) {
        const url = typeof input === 'string' ? input : input.url;
        if (url && url.includes('/api/')) {
          addLog('info', `→ fetch: ${url}`);
        }
        try {
          const res = await _fetch(input, init);
          if (url && url.includes('/api/')) {
            addLog(res.ok ? 'log' : 'error', `← ${res.status} ${url}`);
          }
          return res;
        } catch (e) {
          if (url && url.includes('/api/')) addLog('error', `✗ fetch 실패: ${e.message}`);
          throw e;
        }
      };

      // ── 패널 토글 ──────────────────────────────────────
      toggleBtn.addEventListener('click', () => {
        if (panel.style.display === 'none' || !panel.style.display) {
          panel.style.display = 'flex';
          toggleBtn.style.display = 'none';
          renderLogs();
        }
      });

      document.getElementById('debug-close').addEventListener('click', () => {
        panel.style.display = 'none';
        toggleBtn.style.display = 'flex';
      });

      document.getElementById('debug-clear').addEventListener('click', () => {
        logs.length = 0;
        logBody.innerHTML = '';
        rawOutput.textContent = '';
      });

      // 로그 ↔ 원시 응답 전환
      document.getElementById('debug-raw-btn').addEventListener('click', () => {
        logMode = !logMode;
        if (logMode) {
          rawView.style.display = 'none';
          logBody.style.display = 'flex';
          document.getElementById('debug-raw-btn').textContent = '원시 응답';
          renderLogs();
        } else {
          rawView.style.display = 'block';
          logBody.style.display = 'none';
          document.getElementById('debug-raw-btn').textContent = '로그 보기';
        }
      });

      // 원시 API 응답 조회
      document.getElementById('debug-fetch-raw').addEventListener('click', async () => {
        const sid = document.getElementById('debug-station-input').value.trim() || '26054';
        rawOutput.textContent = '조회 중...';
        try {
          const res = await _fetch(`/api/debug/arrivals?stationId=${sid}`);
          const data = await res.json();
          rawOutput.textContent = JSON.stringify(data, null, 2);
        } catch (e) {
          rawOutput.textContent = '오류: ' + e.message;
        }
      });

      addLog('info', '🔍 디버그 콘솔 초기화 완료 — 우하단 🔍 버튼으로 열기');
    })();
  </script>
</body>

</html>
